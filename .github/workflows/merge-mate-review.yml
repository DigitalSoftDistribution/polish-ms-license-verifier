name: Merge Mate Review
on:
  issue_comment:
    types: [created]
  repository_dispatch:
    types: [merge-mate-apply, merge-mate-undo]
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
concurrency:
  group: merge-mate-review-${{ github.event.issue.number ||
    github.event.client_payload.pr-number }}
  cancel-in-progress: false
jobs:
  review:
    if: >-
      github.event_name == 'repository_dispatch' ||
      (github.event.issue.pull_request && github.event.sender.type != 'Bot')
    runs-on: ubuntu-latest
    steps:
      - uses: gitkraken/merge-mate-action/review@v0.4.3
        with:
          ai-api-key: ${{ secrets.MERGE_MATE_API_KEY }}
