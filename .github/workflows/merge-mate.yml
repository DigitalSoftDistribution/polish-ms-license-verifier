name: Merge Mate Sync
on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr:
        description: 'Specific PR number to sync (optional)'
        required: false
        type: string
concurrency:
  group: merge-mate-sync-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
  pull-requests: write
  id-token: write
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: gitkraken/merge-mate-action/sync@v0.4.3
        with:
          mode: rebase
          apply-policy: auto
          confidence-threshold: 80
          concurrency: 4
          ai-api-key: ${{ secrets.MERGE_MATE_API_KEY }}
